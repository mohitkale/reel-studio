name: Bug report
description: Something is broken in Reel Studio
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Do not paste** API keys, tokens, private voice samples, copyrighted media,
        unredacted project databases, or provider responses with sensitive data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS, Node version, browser, Docker yes/no"
    validations:
      required: true
  - type: dropdown
    id: engine
    attributes:
      label: Video engine (if relevant)
      options:
        - HyperFrames
        - Remotion
        - Podcasts / audio only
        - Not sure / N/A
  - type: textarea
    id: logs
    attributes:
      label: Logs (redacted)
      description: Paste relevant console or server logs with secrets removed.
